<!DOCTYPE html>
<html>
<head>
  <style>
    * {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: Arial, sans-serif;
}

body {
  background: #111;
  color: #fff;
}

header {
  display: flex;
  justify-content: space-between;
  padding: 20px;
  background: #000;
}

header h1 {
  color: #00d4ff;
}

nav a {
  margin-left: 15px;
  text-decoration: none;
  color: #fff;
}

.hero {
  text-align: center;
  padding: 60px 20px;
  background: linear-gradient(to right, #000, #222);
}

.hero h2 {
  font-size: 2.5em;
}

.hero button {
  margin-top: 20px;
  padding: 10px 20px;
  background: #00d4ff;
  border: none;
  cursor: pointer;
}

.products {
  padding: 40px 20px;
  text-align: center;
}

.product-grid {
  display: flex;
  justify-content: center;
  gap: 20px;
  margin-top: 20px;
  flex-wrap: wrap;
}

.card {
  background: #222;
  padding: 20px;
  border-radius: 10px;
  width: 400px;
}

.card img {
  width: 100%;
  border-radius: 10px;
}

.card button {
  margin-top: 10px;
  padding: 8px;
  width: 100%;
  background: #00d4ff;
  border: none;
  cursor: pointer;
}

footer {
  text-align: center;
  padding: 20px;
  background: #000;
  margin-top: 40px;
}
  </style>
</head>
<title>Mode of Payment</title>
<body>

  <header>
    <h1>Puff District</h1>
    <nav>
      <a href="vapeshop.html" class="btn btn-primary">Home</a>
      <a href="VD.html" class="btn btn-primary">Products</a>
      <a href="contact.html" class="btn btn-primary">Contact</a>
    </nav>
  </header>

      <section class="hero">
    <h2>Mode of Payment</h2>
  </section>

  <section class="products">
    <h2></h2>

    <div class="product-grid">

      <div class="card">
        <h3>Cash</h3>
      <form action="cashbot.html">
        <button>Continue</button>
        </form>
      </div>

    </div>
  </section>
    <section class="products">
    <h2></h2>

    <div class="product-grid">

      <div class="card">
        <h3>G Cash</h3>
      <form action="gcashbot.html">
        <button>Continue</button>
        </form>
      </div>

    </div>
  </section>

  <footer>
    <p>Relax. Inhale. Repeat.</p>
  </footer>

</body>
</html>
