<!DOCTYPE html>
<html>
<head>
  <style>
    * {
  margin: 0;
  padding: 0;
  box-sizing: border-box;

body {

  background: #000;
}

nav a {

  text-align: center;
}

.product-grid {

}

.card {
  background: #222;
  padding: 20px;
  border-radius: 10px;
  width: 400px;
}

.card img {
  width: 100%;
  border-radius: 10px;
}

.card button {
  margin-top: 10px;
  padding: 8px;
  width: 100%;
  background: #00d4ff;
  border: none;
  cursor: pointer;
}

footer {
  text-align: center;
  padding: 20px;

  margin-top: 40px;
}
  </style>
  <link rel="stylesheet" href="styles.css">
</head>
