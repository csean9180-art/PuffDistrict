<!DOCTYPE html>
<html>
<head>
  <title>Receipt</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: linear-gradient(to right, #000, #222);
      margin: 0;
      padding: 20px;
    }

    .receipt-container {
      max-width: 400px;
      background: #222;
      margin: auto;
      padding: 20px;
      border-radius: 10px;
      box-shadow: 0 0 10px rgba(0,0,0,0.1);
    }

    .receipt-container button {
  overflow: hidden;
  width: 200px;
  height: 40px;
  background-color: #00d4ff;
  margin-left: 100px;
}

    .receipt-header {
      text-align: center;
      border-bottom: 2px dashed #ccc;
      padding-bottom: 10px;
      margin-bottom: 15px;
      color: white;
    }

    .receipt-header h2 {
      margin: 0;
      color: aqua;
    }

    .receipt-details {
      font-size: 14px;
      margin-bottom: 15px;
    }

    .receipt-details p {
      margin: 5px 0;
      color: white;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      margin-bottom: 15px;
    }

    table th, table td {
      text-align: left;
      padding: 8px 5px;
      border-bottom: 1px solid #ddd;
      color: white;
    }

    table th {
      background: #222;
      color: white;
    }

    .total {
      text-align: right;
      font-size: 16px;
      font-weight: bold;
      color: white;
    }

    .footer {
      text-align: center;
      font-size: 12px;
      border-top: 2px dashed #ccc;
      padding-top: 10px;
      color: white;
    }
  </style>
</head>
<body>

  <div class="receipt-container">
    <div class="receipt-header">
      <h2>Puff District</h2>
      <p>Relax. Inhale. Repeat.</p>
      <p>Date: April 6, 2026</p>
    </div>

    <div class="receipt-details">
      <p><strong>Receipt #:</strong> 0001</p>
      <p><strong>Cashier:</strong> Sean</p>
      <p><strong>Mode of Payment:</strong> GCash</p>
    </div>

    <table>
      <thead>
        <tr>
          <th>Item</th>
          <th>Qty</th>
          <th>Price</th>
        </tr>
      </thead>
      <tbody>
        <tr>
          <td>Cleaning Kit</td>
          <td>1</td>
          <td>₱150.00</td>
        </tr>
      </tbody>
    </table>

    <p class="total">Total: ₱150.00</p>

    <div class="footer">
      <p>Thank you for your purchase!</p>
    </div>
    <form action="vapeshop.html">
        <button>Back to Shop</button>
        </form>
  </div>

</body>
</html>
